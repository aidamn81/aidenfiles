<!DOCTYPE html>
<html lang="en" class="bg-black text-white select-none">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aiden Files</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .edit-grid-bg {
      background-size: 24px 24px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    }

    .touch-none {
      touch-action: none;
    }

    /* Rounded Cube Folder Aesthetic */
    .folder-cube {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15), 0 8px 16px rgba(0, 0, 0, 0.6);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .folder-cube:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body class="bg-black min-h-screen text-zinc-100 selection:bg-zinc-800 overflow-hidden">
  <div id="app" class="h-screen w-screen bg-black text-white flex flex-col overflow-hidden"></div>

  <!-- Hidden File Inputs -->
  <input id="file-input" type="file" multiple class="hidden" />
  <input id="photo-input" type="file" accept="image/*" multiple class="hidden" />

  <script>
    // --- APP STATE ---
    let state = {
      editMode: false,
      currentFolderId: null,
      folders: [],
      files: [],
      ghToken: localStorage.getItem('af_gh_token') || '',
      ghRepo: localStorage.getItem('af_gh_repo') || '', // format: "username/repository"
      isSyncing: false
    };

    // --- UTILITIES ---
    const uid = () => Math.random().toString(36).substring(2, 9);

    function isFolder(item) {
      return !('fileType' in item);
    }

    // --- INDEXEDDB STORAGE ---
    const DB_NAME = 'aiden_files_db';
    const DB_VERSION = 3;

    function openDB() {
      return new Promise((resolve) => {
        try {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('folders')) db.createObjectStore('folders', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('files')) db.createObjectStore('files', { keyPath: 'id' });
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => resolve(null);
        } catch (e) {
          resolve(null);
        }
      });
    }

    async function loadData() {
      const db = await openDB();
      if (db) {
        state.folders = await new Promise((res) => {
          const tx = db.transaction('folders', 'readonly');
          const req = tx.objectStore('folders').getAll();
          req.onsuccess = () => res(req.result || []);
        });
        state.files = await new Promise((res) => {
          const tx = db.transaction('files', 'readonly');
          const req = tx.objectStore('files').getAll();
          req.onsuccess = () => res(req.result || []);
        });
      }

      if (state.folders.length === 0) {
        const root = { id: 'root', name: 'Aiden Files', parentId: null };
        state.folders = [root];
        saveFolder(root);
      }
      render();
    }

    async function saveFolder(folder) {
      const db = await openDB();
      if (db) {
        const tx = db.transaction('folders', 'readwrite');
        tx.objectStore('folders').put(folder);
      }
    }

    async function saveFile(file) {
      const db = await openDB();
      if (db) {
        const tx = db.transaction('files', 'readwrite');
        tx.objectStore('files').put(file);
      }
    }

    async function deleteFromDB(storeName, id) {
      const db = await openDB();
      if (db) {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).delete(id);
      }
    }

    // --- GITHUB SYNC LOGIC ---
    async function syncWithGitHub() {
      if (!state.ghToken || !state.ghRepo) {
        const token = prompt('Enter GitHub Personal Access Token:', state.ghToken);
        const repo = prompt('Enter Repository (e.g. username/my-archive):', state.ghRepo);
        if (!token || !repo) return alert('GitHub token and repository are required for cross-device sync.');
        state.ghToken = token;
        state.ghRepo = repo;
        localStorage.setItem('af_gh_token', token);
        localStorage.setItem('af_gh_repo', repo);
      }

      state.isSyncing = true;
      render();

      try {
        const url = `https://api.github.com/repos/${state.ghRepo}/contents/aiden_data.json`;
        const headers = {
          'Authorization': `token ${state.ghToken}`,
          'Accept': 'application/vnd.github.v3+json'
        };

        // 1. Fetch current remote file sha if exists
        let sha = null;
        const getRes = await fetch(url, { headers });
        if (getRes.ok) {
          const getJson = await getRes.json();
          sha = getJson.sha;
          
          // Optional: Pull remote data if local is empty
          if (state.files.length === 0 && state.folders.length <= 1) {
            const remoteContent = JSON.parse(atob(getJson.content));
            state.folders = remoteContent.folders || state.folders;
            state.files = remoteContent.files || state.files;
            for (let f of state.folders) await saveFolder(f);
            for (let fi of state.files) await saveFile(fi);
            alert('Synced successfully from cloud!');
            state.isSyncing = false;
            render();
            return;
          }
        }

        // 2. Upload local state
        const payload = {
          message: 'Sync Aiden Files',
          content: btoa(unescape(encodeURIComponent(JSON.stringify({
            folders: state.folders,
            files: state.files
          })))),
          ...(sha && { sha })
        };

        const putRes = await fetch(url, {
          method: 'PUT',
          headers,
          body: JSON.stringify(payload)
        });

        if (putRes.ok) {
          alert('Sync Complete! Your files are updated across devices.');
        } else {
          alert('Sync failed. Please check repository permissions.');
        }
      } catch (err) {
        console.error(err);
        alert('Sync error: ' + err.message);
      } finally {
        state.isSyncing = false;
        render();
      }
    }

    // --- UI RENDER ENGINE ---
    function render() {
      const app = document.getElementById('app');
      const currentFolder = state.folders.find(f => f.id === state.currentFolderId);
      const childrenFolders = state.folders.filter(f => f.parentId === state.currentFolderId && f.id !== 'root');
      const childrenFiles = state.files.filter(f => f.parentId === state.currentFolderId);
      const items = [...childrenFolders, ...childrenFiles];

      app.innerHTML = `
        <!-- Top Navigation -->
        <header class="shrink-0 z-30 bg-black/95 backdrop-blur-lg border-b border-zinc-900 px-4 pt-3 pb-3">
          <div class="flex items-center gap-1 text-sm overflow-x-auto no-scrollbar mb-2">
            <button onclick="navigateTo(null)" class="text-zinc-400 hover:text-white shrink-0">Home</button>
            ${currentFolder ? `<span class="text-zinc-600">/</span><span class="text-white font-medium">${currentFolder.name}</span>` : ''}
          </div>
          <div class="flex items-center gap-2">
            <h1 class="flex-1 text-lg font-bold text-white truncate">${currentFolder ? currentFolder.name : 'Aiden Files'}</h1>
            
            <!-- Cloud Sync Button -->
            <button onclick="syncWithGitHub()" class="px-3 py-1.5 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-lg text-xs font-semibold text-zinc-300 flex items-center gap-1.5">
              <i data-lucide="${state.isSyncing ? 'refresh-cw' : 'cloud'}" class="w-3.5 h-3.5 ${state.isSyncing ? 'animate-spin text-amber-400' : 'text-zinc-400'}"></i>
              ${state.isSyncing ? 'Syncing...' : 'Sync Now'}
            </button>

            <!-- Edit Mode Toggle -->
            <button onclick="toggleEditMode()" class="px-3 py-1.5 rounded-lg text-xs font-semibold border ${state.editMode ? 'bg-yellow-500/20 border-yellow-500 text-yellow-400' : 'bg-zinc-900 border-zinc-800 text-zinc-400'}">
              ${state.editMode ? 'Edit Mode' : 'Locked'}
            </button>
            <button onclick="openNewFolderModal()" class="p-2 text-zinc-400 bg-zinc-900 border border-zinc-800 rounded-lg text-xs hover:text-white">+</button>
          </div>

          <!-- File Import Actions -->
          <div class="flex gap-2 mt-3">
            <button onclick="document.getElementById('file-input').click()" class="flex-1 py-2 bg-zinc-900 border border-zinc-800 rounded-xl text-xs text-zinc-200 hover:bg-zinc-800">Import File</button>
            <button onclick="document.getElementById('photo-input').click()" class="flex-1 py-2 bg-zinc-900 border border-zinc-800 rounded-xl text-xs text-zinc-200 hover:bg-zinc-800">Import Photo</button>
          </div>
        </header>

        <!-- Main Workspace View -->
        <main class="flex-1 relative w-full h-full overflow-auto ${state.editMode ? 'edit-grid-bg' : ''}">
          ${items.length === 0 ? `
            <div class="flex flex-col items-center justify-center h-full text-center p-6 text-zinc-500 text-sm">
              Folder is empty
            </div>
          ` : `
            <div class="relative min-w-[800px] min-h-[800px] p-4">
              ${items.map((item, index) => renderItem(item, index)).join('')}
            </div>
          `}
        </main>
      `;

      if (window.lucide) window.lucide.createIcons();
      attachDragListeners();
    }

    function renderItem(item, index) {
      const col = index % 4;
      const row = Math.floor(index / 4);
      const posX = item.x !== undefined ? item.x : (20 + col * 120);
      const posY = item.y !== undefined ? item.y : (20 + row * 140);
      const folder = isFolder(item);

      if (folder) {
        // --- ROUNDED CUBE FOLDER DESIGN ---
        return `
          <div 
            id="item-${item.id}"
            data-id="${item.id}"
            style="left: ${posX}px; top: ${posY}px;" 
            class="absolute flex flex-col items-center gap-1.5 cursor-pointer ${state.editMode ? 'touch-none' : ''}"
          >
            <div 
              onclick="handleItemClick('${item.id}')"
              class="folder-cube bg-gradient-to-b from-zinc-800 to-zinc-950 border border-zinc-700/60 flex flex-col items-center justify-center relative overflow-hidden group"
            >
              <i data-lucide="folder" class="w-10 h-10 text-amber-400 fill-amber-400/20 stroke-[1.5]"></i>
              
              ${state.editMode ? `
                <button onclick="event.stopPropagation(); deleteItem('${item.id}', true)" class="absolute top-1.5 right-1.5 p-1 bg-red-600/80 hover:bg-red-600 rounded-full text-white">
                  <i data-lucide="x" class="w-3 h-3"></i>
                </button>
              ` : ''}
            </div>
            <span class="text-[11px] font-medium text-zinc-300 max-w-[96px] truncate text-center">${item.name}</span>
          </div>
        `;
      } else {
        // --- FILE / THUMBNAIL CARD ---
        const hasThumbnail = item.thumbnailData || (item.fileType && item.fileType.startsWith('image/'));
        const imgSrc = item.thumbnailData || item.dataUrl;

        return `
          <div 
            id="item-${item.id}"
            data-id="${item.id}"
            style="left: ${posX}px; top: ${posY}px;" 
            class="absolute w-24 h-28 bg-zinc-900 border ${state.editMode ? 'border-yellow-500/60 touch-none' : 'border-zinc-800'} rounded-2xl overflow-hidden flex flex-col justify-between shadow-lg"
          >
            <div onclick="handleItemClick('${item.id}')" class="flex-1 bg-zinc-950 relative overflow-hidden flex items-center justify-center cursor-pointer">
              ${hasThumbnail && imgSrc ? `
                <img src="${imgSrc}" class="w-full h-full object-cover" alt="${item.name}" />
              ` : `
                <i data-lucide="file-text" class="text-zinc-500 w-8 h-8"></i>
              `}
            </div>
            <div class="p-1.5 bg-zinc-900 flex items-center justify-between border-t border-zinc-800">
              <span class="text-[10px] font-medium text-zinc-200 truncate flex-1">${item.name}</span>
              ${state.editMode ? `
                <button onclick="event.stopPropagation(); deleteItem('${item.id}', false)" class="text-zinc-500 hover:text-red-400 ml-1">
                  <i data-lucide="trash-2" class="w-3 h-3"></i>
                </button>
              ` : ''}
            </div>
          </div>
        `;
      }
    }

    // --- ACTIONS ---
    function navigateTo(id) { state.currentFolderId = id; render(); }
    function toggleEditMode() { state.editMode = !state.editMode; render(); }

    function handleItemClick(id) {
      if (state.editMode) return;
      const folder = state.folders.find(f => f.id === id);
      if (folder) {
        navigateTo(folder.id);
      } else {
        const file = state.files.find(f => f.id === id);
        if (file) {
          const src = file.dataUrl || file.thumbnailData;
          if (src) {
            const win = window.open();
            if (win) win.document.write(`<body style="margin:0;background:#000;display:flex;align-items:center;justify-center;height:100vh;"><img src="${src}" style="max-width:100%;max-height:100%;margin:auto;"/></body>`);
          }
        }
      }
    }

    async function deleteItem(id, isFolder) {
      if (!confirm('Are you sure you want to delete this item?')) return;
      if (isFolder) {
        state.folders = state.folders.filter(f => f.id !== id);
        deleteFromDB('folders', id);
      } else {
        state.files = state.files.filter(f => f.id !== id);
        deleteFromDB('files', id);
      }
      render();
    }

    function openNewFolderModal() {
      const name = prompt('Folder Name:', 'New Folder');
      if (name) {
        const folder = { id: uid(), name, parentId: state.currentFolderId, x: 20, y: 20 };
        state.folders.push(folder);
        saveFolder(folder);
        render();
      }
    }

    // --- FILE IMPORT + BASE64 THUMBNAIL GENERATOR ---
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
      });
    }

    async function handleFileImport(files) {
      for (const file of Array.from(files)) {
        let dataUrl = null;
        let thumbnailData = null;

        if (file.type.startsWith('image/')) {
          dataUrl = await fileToBase64(file);
          thumbnailData = dataUrl; // Embeds directly into item JSON for cross-device sync & reliable thumbnails
        }

        const item = {
          id: uid(),
          name: file.name,
          fileType: file.type,
          size: file.size,
          dataUrl: dataUrl,
          thumbnailData: thumbnailData,
          parentId: state.currentFolderId,
          x: 20,
          y: 20
        };

        state.files.push(item);
        await saveFile(item);
      }
      render();
    }

    document.getElementById('file-input').addEventListener('change', (e) => handleFileImport(e.target.files));
    document.getElementById('photo-input').addEventListener('change', (e) => handleFileImport(e.target.files));

    // --- TOUCH / DRAG ENGINE ---
    function attachDragListeners() {
      if (!state.editMode) return;

      const elements = document.querySelectorAll('[data-id]');
      elements.forEach(el => {
        let active = false;
        let startX, startY, origX, origY;

        const onStart = (e) => {
          active = true;
          const touch = e.touches ? e.touches[0] : e;
          startX = touch.clientX;
          startY = touch.clientY;
          origX = parseInt(el.style.left) || 0;
          origY = parseInt(el.style.top) || 0;
        };

        const onMove = (e) => {
          if (!active) return;
          const touch = e.touches ? e.touches[0] : e;
          const dx = touch.clientX - startX;
          const dy = touch.clientY - startY;
          el.style.left = `${Math.max(8, origX + dx)}px`;
          el.style.top = `${Math.max(8, origY + dy)}px`;
        };

        const onEnd = () => {
          if (!active) return;
          active = false;
          const id = el.getAttribute('data-id');
          const nx = parseInt(el.style.left);
          const ny = parseInt(el.style.top);

          let target = state.folders.find(f => f.id === id) || state.files.find(f => f.id === id);
          if (target) {
            target.x = nx;
            target.y = ny;
            if (isFolder(target)) saveFolder(target); else saveFile(target);
          }
        };

        el.addEventListener('touchstart', onStart, { passive: true });
        window.addEventListener('touchmove', onMove, { passive: true });
        window.addEventListener('touchend', onEnd);
      });
    }

    // Startup
    loadData();
  </script>
</body>
</html>
