<!DOCTYPE html>
<html lang="en" class="bg-black text-white select-none">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aiden Files</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .edit-grid-bg {
      background-size: 24px 24px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    }

    .touch-none { touch-action: none; }

    .folder-cube {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15), 0 8px 16px rgba(0, 0, 0, 0.6);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .folder-cube:active { transform: scale(0.95); }

    /* Enlarged Resize Touch Area */
    .resize-handle {
      width: 28px;
      height: 28px;
      bottom: -4px;
      right: -4px;
      border-top-left-radius: 12px;
      touch-action: none;
    }
  </style>
</head>
<body class="bg-black min-h-screen text-zinc-100 selection:bg-zinc-800 overflow-hidden">
  <div id="app" class="h-screen w-screen bg-black text-white flex flex-col overflow-hidden"></div>

  <!-- Hidden Inputs -->
  <input id="file-input" type="file" multiple class="hidden" />
  <input id="photo-input" type="file" accept="image/*,video/*,audio/*" multiple class="hidden" />
  <input id="change-image-input" type="file" accept="image/*" class="hidden" />
  <input id="folder-cover-input" type="file" accept="image/*" class="hidden" />

  <script>
    // --- CONFIG & STATE ---
    const CONFIG = {
      ghRepo: 'aidamn81/aidenvidz',
      ghPath: 'aiden_data.json',
      GRID_SIZE: 24
    };

    let state = {
      editMode: false,
      selectMode: false,
      selectedIds: [],
      currentFolderId: null,
      folders: [],
      files: [],
      ghToken: localStorage.getItem('af_gh_token') || '',
      isSyncing: false,
      activeMenuId: null,
      targetChangeImageId: null,
      targetFolderCoverId: null,
      quickViewFileId: null,
      showUploadModal: false
    };

    const uid = () => Math.random().toString(36).substring(2, 9);
    const isFolder = item => !('fileType' in item);

    // --- HELPER FOR MEDIA PLAYBACK (iOS WebKit Blob URL conversion) ---
    function dataURLtoBlobUrl(dataUrl) {
      try {
        if (!dataUrl) return '';
        if (dataUrl.startsWith('blob:')) return dataUrl;
        const parts = dataUrl.split(',');
        const mimeMatch = parts[0].match(/:(.*?);/);
        const mime = mimeMatch ? mimeMatch[1] : 'audio/mpeg';
        const bstr = atob(parts[1]);
        let n = bstr.length;
        const u8arr = new Uint8Array(n);
        while (n--) {
          u8arr[n] = bstr.charCodeAt(n);
        }
        const blob = new Blob([u8arr], { type: mime });
        return URL.createObjectURL(blob);
      } catch (e) {
        console.error("Error converting Data URL to Blob URL:", e);
        return dataUrl;
      }
    }

    // --- INDEXEDDB ---
    const DB_NAME = 'aiden_files_db';
    const DB_VERSION = 3;

    function openDB() {
      return new Promise((resolve) => {
        try {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('folders')) db.createObjectStore('folders', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('files')) db.createObjectStore('files', { keyPath: 'id' });
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => resolve(null);
        } catch (e) { resolve(null); }
      });
    }

    async function loadData() {
      const db = await openDB();
      if (db) {
        state.folders = await new Promise(res => {
          const tx = db.transaction('folders', 'readonly');
          const req = tx.objectStore('folders').getAll();
          req.onsuccess = () => res(req.result || []);
        });
        state.files = await new Promise(res => {
          const tx = db.transaction('files', 'readonly');
          const req = tx.objectStore('files').getAll();
          req.onsuccess = () => res(req.result || []);
        });
      }

      if (state.folders.length === 0) {
        const root = { id: 'root', name: 'Aiden Files', parentId: null, width: 96, height: 96 };
        state.folders = [root];
        saveFolder(root);
      }
      render();
    }

    async function saveFolder(folder) {
      const db = await openDB();
      if (db) {
        const tx = db.transaction('folders', 'readwrite');
        tx.objectStore('folders').put(folder);
      }
    }

    async function saveFile(file) {
      const db = await openDB();
      if (db) {
        const tx = db.transaction('files', 'readwrite');
        tx.objectStore('files').put(file);
      }
    }

    async function deleteFromDB(storeName, id) {
      const db = await openDB();
      if (db) {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).delete(id);
      }
    }

    // --- GITHUB SYNC ---
    async function syncWithGitHub(forcePull = false) {
      if (!state.ghToken) {
        const token = prompt('Enter your GitHub Personal Access Token:');
        if (!token) return;
        state.ghToken = token;
        localStorage.setItem('af_gh_token', token);
      }

      state.isSyncing = true;
      render();

      try {
        const url = `https://api.github.com/repos/${CONFIG.ghRepo}/contents/${CONFIG.ghPath}`;
        const headers = {
          'Authorization': `token ${state.ghToken}`,
          'Accept': 'application/vnd.github.v3+json'
        };

        let sha = null;
        const getRes = await fetch(url, { headers });
        if (getRes.ok) {
          const getJson = await getRes.json();
          sha = getJson.sha;
          
          if (forcePull || (state.files.length === 0 && state.folders.length <= 1)) {
            const remoteContent = JSON.parse(decodeURIComponent(escape(atob(getJson.content))));
            state.folders = remoteContent.folders || state.folders;
            state.files = remoteContent.files || state.files;
            for (let f of state.folders) await saveFolder(f);
            for (let fi of state.files) await saveFile(fi);
            alert('Synced data down from Cloud!');
            state.isSyncing = false;
            render();
            return;
          }
        }

        const jsonString = JSON.stringify({ folders: state.folders, files: state.files });
        const payload = {
          message: 'Sync Aiden Files Data',
          content: btoa(unescape(encodeURIComponent(jsonString))),
          ...(sha && { sha })
        };

        const putRes = await fetch(url, { method: 'PUT', headers, body: JSON.stringify(payload) });
        if (putRes.ok) alert('Sync Successful! Cloud backup updated.');
        else alert('Sync failed. Please check repository permissions.');
      } catch (err) {
        alert('Sync error: ' + err.message);
      } finally {
        state.isSyncing = false;
        render();
      }
    }

    // --- RENDER ---
    function render() {
      const app = document.getElementById('app');
      const currentFolder = state.folders.find(f => f.id === state.currentFolderId);
      const childrenFolders = state.folders.filter(f => f.parentId === state.currentFolderId && f.id !== 'root');
      const childrenFiles = state.files.filter(f => f.parentId === state.currentFolderId);
      const items = [...childrenFolders, ...childrenFiles];

      const allChildrenSelected = items.length > 0 && items.every(item => state.selectedIds.includes(item.id));

      app.innerHTML = `
        <!-- Header Controls -->
        <header class="shrink-0 z-30 bg-black/95 backdrop-blur-lg border-b border-zinc-900 px-4 py-3 flex flex-col gap-3">
          <div class="flex items-center justify-between gap-2 flex-wrap">
            
            <!-- Left Sync Button -->
            <button onclick="syncWithGitHub()" class="px-3.5 py-2.5 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-2xl text-xs font-bold text-zinc-300 flex items-center gap-2 shadow-sm">
              <i data-lucide="${state.isSyncing ? 'refresh-cw' : 'cloud'}" class="w-4 h-4 ${state.isSyncing ? 'animate-spin text-amber-400' : 'text-zinc-400'}"></i>
              <span class="hidden sm:inline">${state.isSyncing ? 'Syncing...' : 'Sync'}</span>
            </button>

            <!-- Centered Larger Buttons: Home & Add -->
            <div class="flex items-center justify-center gap-3 flex-1">
              <button onclick="navigateTo(null)" class="px-5 py-2.5 bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-white font-bold rounded-2xl text-base flex items-center gap-2 shadow-md">
                <i data-lucide="home" class="w-5 h-5 text-amber-400"></i> Home
              </button>
              <button onclick="openUploadModal()" class="px-6 py-2.5 bg-amber-500 hover:bg-amber-400 text-black font-extrabold rounded-2xl text-base flex items-center gap-2 shadow-lg shadow-amber-500/20">
                <i data-lucide="plus" class="w-5 h-5 stroke-[3]"></i> Add Item
              </button>
            </div>

            <!-- Right Controls: Select / Select All / Edit -->
            <div class="flex items-center gap-2">
              ${state.selectMode ? `
                <button onclick="toggleSelectAll()" class="px-3.5 py-2.5 bg-indigo-950 border border-indigo-700 rounded-2xl text-xs font-bold text-indigo-300 flex items-center gap-1.5 shadow-sm">
                  <i data-lucide="${allChildrenSelected ? 'check-square' : 'square'}" class="w-4 h-4"></i>
                  ${allChildrenSelected ? 'Deselect All' : 'Select All'}
                </button>
              ` : ''}

              <button onclick="toggleSelectMode()" class="px-3.5 py-2.5 rounded-2xl text-xs font-bold border ${state.selectMode ? 'bg-indigo-500/20 border-indigo-500 text-indigo-300' : 'bg-zinc-900 border-zinc-800 text-zinc-400'}">
                ${state.selectMode ? 'Cancel' : 'Select'}
              </button>

              <button onclick="toggleEditMode()" class="px-3.5 py-2.5 rounded-2xl text-xs font-bold border ${state.editMode ? 'bg-yellow-500/20 border-yellow-500 text-yellow-400' : 'bg-zinc-900 border-zinc-800 text-zinc-400'}">
                ${state.editMode ? 'Done' : 'Edit'}
              </button>
            </div>
          </div>

          <!-- Breadcrumbs -->
          <div class="flex items-center gap-1.5 text-xs text-zinc-400 overflow-x-auto no-scrollbar pt-1">
            <span onclick="navigateTo(null)" class="cursor-pointer hover:text-white">Home</span>
            ${currentFolder ? `<span class="text-zinc-600">/</span><span class="text-white font-semibold">${currentFolder.name}</span>` : ''}
          </div>
        </header>

        <!-- Canvas Area -->
        <main onclick="closeMenu()" class="flex-1 relative w-full h-full overflow-auto ${state.editMode ? 'edit-grid-bg' : ''}">
          ${items.length === 0 ? `
            <div class="flex flex-col items-center justify-center h-full text-center p-6 text-zinc-500 text-sm">
              Folder is empty
            </div>
          ` : `
            <div class="relative min-w-[800px] min-h-[800px] p-4">
              ${items.map((item, index) => renderItem(item, index)).join('')}
            </div>
          `}
        </main>

        <!-- Multi-Select Action Bar -->
        ${state.selectMode && state.selectedIds.length > 0 ? `
          <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900/95 border border-zinc-700 backdrop-blur-xl px-6 py-3.5 rounded-2xl shadow-2xl z-40 flex items-center gap-5">
            <span class="text-xs font-bold text-zinc-300">${state.selectedIds.length} Selected</span>
            <div class="h-4 w-px bg-zinc-800"></div>
            <button onclick="bulkCopy()" class="flex items-center gap-1.5 text-xs text-zinc-200 hover:text-amber-400 font-bold">
              <i data-lucide="copy" class="w-4 h-4"></i> Copy
            </button>
            <button onclick="bulkMove()" class="flex items-center gap-1.5 text-xs text-zinc-200 hover:text-amber-400 font-bold">
              <i data-lucide="folder-output" class="w-4 h-4"></i> Move
            </button>
            <button onclick="bulkDelete()" class="flex items-center gap-1.5 text-xs text-red-400 hover:text-red-300 font-bold">
              <i data-lucide="trash-2" class="w-4 h-4"></i> Delete
            </button>
          </div>
        ` : ''}

        <!-- Upload Prompt Modal -->
        ${state.showUploadModal ? renderUploadModal() : ''}

        <!-- Quick View Popup -->
        ${state.quickViewFileId ? renderQuickViewModal() : ''}
      `;

      if (window.lucide) window.lucide.createIcons();
      attachDragAndResizeListeners();
    }

    function getFileIcon(type, name) {
      if (type.startsWith('video/')) return 'video';
      if (type.startsWith('audio/')) return 'music';
      if (type === 'application/pdf' || name.endsWith('.pdf')) return 'file-text';
      if (type.startsWith('text/') || name.endsWith('.txt')) return 'file-text';
      return 'file';
    }

    function renderItem(item, index) {
      const col = index % 4;
      const row = Math.floor(index / 4);
      const posX = item.x !== undefined ? item.x : (20 + col * 140);
      const posY = item.y !== undefined ? item.y : (20 + row * 160);
      const itemWidth = item.width || (isFolder(item) ? 96 : 112);
      const itemHeight = item.height || (isFolder(item) ? 96 : 128);
      const folder = isFolder(item);
      const isMenuOpen = state.activeMenuId === item.id;
      const isSelected = state.selectedIds.includes(item.id);

      if (folder) {
        return `
          <div 
            id="item-${item.id}"
            data-id="${item.id}"
            style="left: ${posX}px; top: ${posY}px; width: ${itemWidth}px; height: ${itemHeight}px;" 
            class="absolute flex flex-col items-center cursor-pointer ${state.editMode ? 'touch-none' : ''}"
            onclick="handleItemClick(event, '${item.id}', true)"
          >
            <div class="folder-cube bg-gradient-to-b from-zinc-800 to-zinc-950 border ${isSelected ? 'border-indigo-500 ring-2 ring-indigo-500/50' : 'border-zinc-700/60'} flex flex-col items-center justify-center relative overflow-hidden group">
              ${item.coverUrl ? `
                <img src="${item.coverUrl}" class="w-full h-full object-cover pointer-events-none" />
              ` : `
                <i data-lucide="folder" class="w-10 h-10 text-amber-400 fill-amber-400/20 stroke-[1.5] pointer-events-none"></i>
              `}

              ${state.selectMode ? `
                <div class="absolute top-2 left-2 w-5 h-5 rounded-md border border-zinc-400 flex items-center justify-center ${isSelected ? 'bg-indigo-600 border-indigo-600' : 'bg-black/60'} pointer-events-none">
                  ${isSelected ? '<i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>' : ''}
                </div>
              ` : ''}

              ${!state.selectMode ? `
                <button onclick="event.stopPropagation(); toggleMenu('${item.id}')" class="absolute top-1.5 right-1.5 p-1.5 bg-black/50 hover:bg-black/90 rounded-full text-zinc-300 z-10">
                  <i data-lucide="more-vertical" class="w-4 h-4"></i>
                </button>
              ` : ''}
            </div>
            <span class="text-[11px] font-medium text-zinc-300 max-w-full truncate text-center mt-1.5 pointer-events-none">${item.name}</span>

            ${state.editMode ? '<div class="resize-handle absolute bottom-0 right-0 bg-yellow-500 rounded-tl-xl cursor-se-resize flex items-center justify-center z-20 shadow-md"><i data-lucide="arrow-down-right" class="w-3 h-3 text-black stroke-[3]"></i></div>' : ''}
            ${isMenuOpen ? renderContextMenu(item, true) : ''}
          </div>
        `;
      } else {
        const type = item.fileType || '';
        const isImage = type.startsWith('image/');
        const imgSrc = item.dataUrl || item.thumbnailData;
        const icon = getFileIcon(type, item.name);

        return `
          <div 
            id="item-${item.id}"
            data-id="${item.id}"
            style="left: ${posX}px; top: ${posY}px; width: ${itemWidth}px; height: ${itemHeight}px;" 
            class="absolute bg-zinc-900 border ${isSelected ? 'border-indigo-500 ring-2 ring-indigo-500/50' : state.editMode ? 'border-yellow-500/60 touch-none' : 'border-zinc-800'} rounded-2xl overflow-hidden flex flex-col justify-between shadow-lg cursor-pointer"
            onclick="handleItemClick(event, '${item.id}', false)"
          >
            <div class="flex-1 bg-zinc-950 relative overflow-hidden flex items-center justify-center">
              ${isImage && imgSrc ? `
                <img src="${imgSrc}" class="w-full h-full object-cover pointer-events-none" alt="${item.name}" />
              ` : `
                <div class="flex flex-col items-center gap-1 text-zinc-400">
                  <i data-lucide="${icon}" class="w-8 h-8 text-amber-400 pointer-events-none"></i>
                  ${type.startsWith('video/') ? '<span class="text-[9px] uppercase font-bold tracking-wider text-zinc-500">Video</span>' : ''}
                  ${type.startsWith('audio/') ? '<span class="text-[9px] uppercase font-bold tracking-wider text-zinc-500">Audio</span>' : ''}
                  ${type === 'application/pdf' ? '<span class="text-[9px] uppercase font-bold tracking-wider text-red-400">PDF</span>' : ''}
                  ${type.startsWith('text/') ? '<span class="text-[9px] uppercase font-bold tracking-wider text-blue-400">TEXT</span>' : ''}
                </div>
              `}

              ${state.selectMode ? `
                <div class="absolute top-2 left-2 w-5 h-5 rounded-md border border-zinc-400 flex items-center justify-center ${isSelected ? 'bg-indigo-600 border-indigo-600' : 'bg-black/60'} pointer-events-none">
                  ${isSelected ? '<i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>' : ''}
                </div>
              ` : ''}
              
              ${!state.selectMode ? `
                <button onclick="event.stopPropagation(); toggleMenu('${item.id}')" class="absolute top-1.5 right-1.5 p-1.5 bg-black/60 hover:bg-black/90 rounded-full text-zinc-200 backdrop-blur-sm z-10">
                  <i data-lucide="more-vertical" class="w-4 h-4"></i>
                </button>
              ` : ''}
            </div>
            <div class="p-1.5 bg-zinc-900 flex items-center justify-between border-t border-zinc-800 pointer-events-none">
              <span class="text-[10px] font-medium text-zinc-200 truncate flex-1">${item.name}</span>
            </div>

            ${state.editMode ? '<div class="resize-handle absolute bottom-0 right-0 bg-yellow-500 rounded-tl-xl cursor-se-resize flex items-center justify-center z-20 shadow-md"><i data-lucide="arrow-down-right" class="w-3 h-3 text-black stroke-[3]"></i></div>' : ''}
            ${isMenuOpen ? renderContextMenu(item, false) : ''}
          </div>
        `;
      }
    }

    // --- CONTEXT MENU OPTIONS ---
    function renderContextMenu(item, isFolderItem) {
      return `
        <div onclick="event.stopPropagation()" class="absolute left-full top-0 ml-2 w-48 bg-zinc-900/95 border border-zinc-700/80 rounded-xl shadow-2xl backdrop-blur-md z-50 overflow-hidden text-xs py-1">
          ${isFolderItem ? `
            <button onclick="triggerFolderCover('${item.id}')" class="w-full px-3 py-2 text-left hover:bg-zinc-800 flex items-center gap-2 text-zinc-200">
              <i data-lucide="image" class="w-3.5 h-3.5 text-zinc-400"></i> Change Cover
            </button>
          ` : `
            <button onclick="openQuickView('${item.id}')" class="w-full px-3 py-2 text-left hover:bg-zinc-800 flex items-center gap-2 text-zinc-200">
              <i data-lucide="eye" class="w-3.5 h-3.5 text-zinc-400"></i> Open / Preview
            </button>
            <button onclick="shareFile('${item.id}')" class="w-full px-3 py-2 text-left hover:bg-zinc-800 flex items-center gap-2 text-zinc-200">
              <i data-lucide="share" class="w-3.5 h-3.5 text-zinc-400"></i> Share (iOS)
            </button>
            <button onclick="triggerChangeImage('${item.id}')" class="w-full px-3 py-2 text-left hover:bg-zinc-800 flex items-center gap-2 text-zinc-200">
              <i data-lucide="image" class="w-3.5 h-3.5 text-zinc-400"></i> Change Image
            </button>
          `}
          <button onclick="renameItem('${item.id}', ${isFolderItem})" class="w-full px-3 py-2 text-left hover:bg-zinc-800 flex items-center gap-2 text-zinc-200">
            <i data-lucide="edit-3" class="w-3.5 h-3.5 text-zinc-400"></i> Rename
          </button>
          <button onclick="moveToFolder('${item.id}', ${isFolderItem})" class="w-full px-3 py-2 text-left hover:bg-zinc-800 flex items-center gap-2 text-zinc-200">
            <i data-lucide="folder-output" class="w-3.5 h-3.5 text-zinc-400"></i> Move
          </button>
          <button onclick="snapToOriginalShape('${item.id}')" class="w-full px-3 py-2 text-left hover:bg-zinc-800 flex items-center gap-2 text-zinc-200">
            <i data-lucide="rotate-ccw" class="w-3.5 h-3.5 text-zinc-400"></i> Resize Original
          </button>
          <div class="h-px bg-zinc-800 my-1"></div>
          <button onclick="deleteItemConfirm('${item.id}', ${isFolderItem})" class="w-full px-3 py-2 text-left hover:bg-red-500/10 flex items-center gap-2 text-red-400 font-medium">
            <i data-lucide="trash-2" class="w-3.5 h-3.5 text-red-400"></i> Delete
          </button>
        </div>
      `;
    }

    // --- UPLOAD MODAL ---
    function renderUploadModal() {
      return `
        <div class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex items-center justify-center p-4" onclick="closeUploadModal()">
          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 w-full max-w-sm flex flex-col gap-4 text-center shadow-2xl" onclick="event.stopPropagation()">
            <h3 class="text-lg font-bold text-white">Add Item</h3>
            <p class="text-xs text-zinc-400">Where do you want to upload your files from?</p>
            <div class="flex flex-col gap-2.5 mt-2">
              <button onclick="document.getElementById('file-input').click(); closeUploadModal();" class="w-full py-3 bg-zinc-800 hover:bg-zinc-700 text-zinc-100 font-semibold rounded-2xl text-sm flex items-center justify-center gap-2">
                <i data-lucide="file" class="w-4 h-4 text-amber-400"></i> Files App
              </button>
              <button onclick="document.getElementById('photo-input').click(); closeUploadModal();" class="w-full py-3 bg-zinc-800 hover:bg-zinc-700 text-zinc-100 font-semibold rounded-2xl text-sm flex items-center justify-center gap-2">
                <i data-lucide="image" class="w-4 h-4 text-amber-400"></i> Photos, Audio & Videos
              </button>
              <button onclick="openNewFolderModal(); closeUploadModal();" class="w-full py-3 bg-zinc-800/60 hover:bg-zinc-800 text-zinc-300 font-semibold rounded-2xl text-sm flex items-center justify-center gap-2 border border-zinc-700/50">
                <i data-lucide="folder-plus" class="w-4 h-4 text-amber-400"></i> New Folder
              </button>
            </div>
            <button onclick="closeUploadModal()" class="text-xs text-zinc-500 hover:text-zinc-300 mt-2 font-medium">Cancel</button>
          </div>
        </div>
      `;
    }

    // --- QUICK VIEW & MEDIA PLAYER MODAL ---
    function renderQuickViewContent(file) {
      const type = file.fileType || '';
      
      if (type.startsWith('image/')) {
        return `<img src="${file.dataUrl}" class="max-w-full max-h-full object-contain rounded-2xl shadow-2xl" />`;
      }
      
      if (type.startsWith('video/')) {
        const videoBlobUrl = dataURLtoBlobUrl(file.dataUrl);
        return `
          <video controls playsinline autoplay class="max-w-full max-h-full rounded-2xl shadow-2xl bg-black" src="${videoBlobUrl}">
            Your browser does not support playing this video.
          </video>
        `;
      }

      if (type.startsWith('audio/')) {
        const audioBlobUrl = dataURLtoBlobUrl(file.dataUrl);
        return `
          <div class="flex flex-col items-center gap-6 p-8 bg-zinc-900 border border-zinc-800 rounded-3xl max-w-sm w-full shadow-2xl text-center">
            <div class="w-20 h-20 bg-amber-500/10 rounded-full flex items-center justify-center text-amber-400">
              <i data-lucide="music" class="w-10 h-10"></i>
            </div>
            <span class="text-sm font-semibold text-zinc-200 max-w-full truncate">${file.name}</span>
            <audio controls playsinline autoplay class="w-full" src="${audioBlobUrl}">
              Your browser does not support audio playback.
            </audio>
          </div>
        `;
      }

      if (type === 'application/pdf' || file.name.endsWith('.pdf')) {
        return `
          <iframe src="${file.dataUrl}" class="w-full h-full rounded-2xl border border-zinc-800 bg-white"></iframe>
        `;
      }

      if (type.startsWith('text/') || file.name.endsWith('.txt')) {
        return `
          <div class="w-full h-full bg-zinc-900 border border-zinc-800 rounded-2xl p-4 overflow-auto text-xs font-mono text-zinc-300 whitespace-pre-wrap select-text">
            ${file.textContent || 'No text content available.'}
          </div>
        `;
      }

      return `
        <div class="flex flex-col items-center gap-3 text-zinc-500">
          <i data-lucide="file-text" class="w-16 h-16"></i>
          <span class="text-xs text-zinc-400">${file.name}</span>
          <span class="text-[10px] text-zinc-600">Preview not directly available. Use Share to open in native apps.</span>
        </div>
      `;
    }

    function renderQuickViewModal() {
      const file = state.files.find(f => f.id === state.quickViewFileId);
      if (!file) return '';

      return `
        <div class="fixed inset-0 z-50 bg-black/90 backdrop-blur-xl flex flex-col justify-between p-4" onclick="closeQuickView()">
          <div class="flex items-center justify-between text-zinc-300 pt-2 px-2" onclick="event.stopPropagation()">
            <span class="text-sm font-semibold truncate max-w-[200px]">${file.name}</span>
            <button onclick="closeQuickView()" class="p-2 bg-zinc-900 border border-zinc-800 rounded-full hover:text-white">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>

          <div class="flex-1 flex items-center justify-center overflow-hidden my-4" onclick="event.stopPropagation()">
            ${renderQuickViewContent(file)}
          </div>

          <!-- Quick View Action Toolbar -->
          <div class="bg-zinc-900/90 border border-zinc-800 rounded-2xl p-3 flex items-center justify-around text-xs font-semibold text-zinc-200" onclick="event.stopPropagation()">
            <button onclick="copySingleFile('${file.id}')" class="flex flex-col items-center gap-1 hover:text-amber-400">
              <i data-lucide="copy" class="w-5 h-5"></i> Copy
            </button>
            <button onclick="moveToFolder('${file.id}', false); closeQuickView();" class="flex flex-col items-center gap-1 hover:text-amber-400">
              <i data-lucide="folder-output" class="w-5 h-5"></i> Move
            </button>
            <button onclick="shareFile('${file.id}')" class="flex flex-col items-center gap-1 hover:text-amber-400">
              <i data-lucide="share" class="w-5 h-5"></i> Share
            </button>
            <button onclick="deleteItemConfirm('${file.id}', false); closeQuickView();" class="flex flex-col items-center gap-1 text-red-400 hover:text-red-300">
              <i data-lucide="trash-2" class="w-5 h-5"></i> Delete
            </button>
          </div>
        </div>
      `;
    }

    // --- SELECTION & CLICK HANDLERS ---
    function toggleSelectMode() {
      state.selectMode = !state.selectMode;
      state.selectedIds = [];
      closeMenu();
      render();
    }

    function toggleSelectAll() {
      const childrenFolders = state.folders.filter(f => f.parentId === state.currentFolderId && f.id !== 'root');
      const childrenFiles = state.files.filter(f => f.parentId === state.currentFolderId);
      const items = [...childrenFolders, ...childrenFiles];

      const allSelected = items.length > 0 && items.every(item => state.selectedIds.includes(item.id));

      if (allSelected) {
        state.selectedIds = [];
      } else {
        state.selectedIds = items.map(item => item.id);
      }
      render();
    }

    function handleItemClick(e, id, isFolderItem) {
      if (state.selectMode) {
        if (state.selectedIds.includes(id)) {
          state.selectedIds = state.selectedIds.filter(i => i !== id);
        } else {
          state.selectedIds.push(id);
        }
        render();
        return;
      }

      if (state.editMode) return;

      if (isFolderItem) {
        navigateTo(id);
      } else {
        openQuickView(id);
      }
    }

    function openUploadModal() { state.showUploadModal = true; render(); }
    function closeUploadModal() { state.showUploadModal = false; render(); }

    function openQuickView(id) { state.quickViewFileId = id; closeMenu(); render(); }
    function closeQuickView() { state.quickViewFileId = null; render(); }

    function navigateTo(id) { state.currentFolderId = id; closeMenu(); render(); }
    function toggleEditMode() { state.editMode = !state.editMode; closeMenu(); render(); }
    function toggleMenu(id) { state.activeMenuId = state.activeMenuId === id ? null : id; render(); }
    function closeMenu() { if (state.activeMenuId) { state.activeMenuId = null; render(); } }

    // --- BULK OPERATIONS ---
    async function bulkDelete() {
      if (!confirm(`Delete ${state.selectedIds.length} items?`)) return;
      for (let id of state.selectedIds) {
        state.folders = state.folders.filter(f => f.id !== id);
        state.files = state.files.filter(f => f.id !== id);
        await deleteFromDB('folders', id);
        await deleteFromDB('files', id);
      }
      state.selectedIds = [];
      render();
    }

    async function bulkMove() {
      const targetFolders = state.folders.filter(f => !state.selectedIds.includes(f.id));
      let promptText = "Enter destination folder ID or 'root':\n" + targetFolders.map(f => `- ${f.name} (ID: ${f.id})`).join('\n');
      const targetId = prompt(promptText, 'root');
      if (targetId) {
        const actualParent = targetId === 'root' ? null : targetId;
        for (let id of state.selectedIds) {
          let f = state.folders.find(item => item.id === id);
          let fi = state.files.find(item => item.id === id);
          if (f) { f.parentId = actualParent; await saveFolder(f); }
          if (fi) { fi.parentId = actualParent; await saveFile(fi); }
        }
        state.selectedIds = [];
        render();
      }
    }

    async function bulkCopy() {
      for (let id of state.selectedIds) {
        let file = state.files.find(f => f.id === id);
        if (file) {
          const newFile = { ...file, id: uid(), name: file.name + ' (Copy)' };
          delete newFile.x;
          delete newFile.y;
          state.files.push(newFile);
          await saveFile(newFile);
        }
      }
      state.selectedIds = [];
      render();
    }

    async function copySingleFile(id) {
      let file = state.files.find(f => f.id === id);
      if (file) {
        const newFile = { ...file, id: uid(), name: file.name + ' (Copy)' };
        delete newFile.x;
        delete newFile.y;
        state.files.push(newFile);
        await saveFile(newFile);
        alert('File copied successfully!');
        closeQuickView();
        render();
      }
    }

    // iOS SHARE SHEET API INTEGRATION
    async function shareFile(id) {
      const file = state.files.find(f => f.id === id);
      if (!file) return;

      if (navigator.canShare && file.dataUrl) {
        try {
          const res = await fetch(file.dataUrl);
          const blob = await res.blob();
          const nativeFile = new File([blob], file.name, { type: file.fileType || blob.type });

          if (navigator.canShare({ files: [nativeFile] })) {
            await navigator.share({
              files: [nativeFile],
              title: file.name
            });
            return;
          }
        } catch (e) {
          console.error("Native file share fallback triggered:", e);
        }
      }

      if (navigator.share) {
        try {
          await navigator.share({ title: file.name, text: file.name, url: file.dataUrl });
        } catch (e) { console.error(e); }
      } else {
        alert('Sharing is not supported on this browser/device.');
      }
    }

    // --- COVERS & IMAGES ---
    function triggerFolderCover(id) {
      state.targetFolderCoverId = id;
      document.getElementById('folder-cover-input').click();
      closeMenu();
    }

    document.getElementById('folder-cover-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (file && state.targetFolderCoverId) {
        const base64 = await fileToBase64(file);
        const folder = state.folders.find(f => f.id === state.targetFolderCoverId);
        if (folder) {
          folder.coverUrl = base64;
          await saveFolder(folder);
          render();
        }
      }
    });

    function triggerChangeImage(id) {
      state.targetChangeImageId = id;
      document.getElementById('change-image-input').click();
      closeMenu();
    }

    document.getElementById('change-image-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (file && state.targetChangeImageId) {
        const base64 = await fileToBase64(file);
        const item = state.files.find(f => f.id === state.targetChangeImageId);
        if (item) {
          item.dataUrl = base64;
          await saveFile(item);
          render();
        }
      }
    });

    async function renameItem(id, isFolderItem) {
      const item = isFolderItem ? state.folders.find(f => f.id === id) : state.files.find(f => f.id === id);
      if (item) {
        const newName = prompt('Rename item:', item.name);
        if (newName) {
          item.name = newName;
          if (isFolderItem) await saveFolder(item); else await saveFile(item);
          closeMenu();
          render();
        }
      }
    }

    async function moveToFolder(id, isFolderItem) {
      const targetFolders = state.folders.filter(f => f.id !== id);
      let promptText = "Enter destination folder ID or 'root':\n" + targetFolders.map(f => `- ${f.name} (ID: ${f.id})`).join('\n');
      const targetId = prompt(promptText, 'root');
      if (targetId) {
        const actualParent = targetId === 'root' ? null : targetId;
        const item = isFolderItem ? state.folders.find(f => f.id === id) : state.files.find(f => f.id === id);
        if (item) {
          item.parentId = actualParent;
          delete item.x;
          delete item.y;
          if (isFolderItem) await saveFolder(item); else await saveFile(item);
          closeMenu();
          render();
        }
      }
    }

    async function snapToOriginalShape(id) {
      const item = state.folders.find(f => f.id === id) || state.files.find(f => f.id === id);
      if (item) {
        item.width = isFolder(item) ? 96 : 112;
        item.height = isFolder(item) ? 96 : 128;
        if (isFolder(item)) await saveFolder(item); else await saveFile(item);
        closeMenu();
        render();
      }
    }

    async function deleteItemConfirm(id, isFolderItem) {
      if (!confirm('Are you sure you want to delete this item?')) return;
      if (isFolderItem) {
        state.folders = state.folders.filter(f => f.id !== id);
        await deleteFromDB('folders', id);
      } else {
        state.files = state.files.filter(f => f.id !== id);
        await deleteFromDB('files', id);
      }
      closeMenu();
      render();
    }

    function openNewFolderModal() {
      const name = prompt('Folder Name:', 'New Folder');
      if (name) {
        const folder = { id: uid(), name, parentId: state.currentFolderId, width: 96, height: 96 };
        state.folders.push(folder);
        saveFolder(folder);
        render();
      }
    }

    // --- FILE CONVERSION & PARSING ---
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
      });
    }

    function fileToText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
        reader.readAsText(file);
      });
    }

    function getMimeType(file) {
      if (file.type && file.type !== '') return file.type;
      const ext = file.name.split('.').pop().toLowerCase();
      const mimeMap = {
        'mp3': 'audio/mpeg',
        'm4a': 'audio/mp4',
        'aac': 'audio/aac',
        'wav': 'audio/wav',
        'ogg': 'audio/ogg',
        'flac': 'audio/flac',
        'mp4': 'video/mp4',
        'mov': 'video/quicktime',
        'webm': 'video/webm',
        'pdf': 'application/pdf',
        'txt': 'text/plain'
      };
      return mimeMap[ext] || 'application/octet-stream';
    }

    async function handleFileImport(files) {
      for (const file of Array.from(files)) {
        let dataUrl = await fileToBase64(file);
        let textContent = null;
        let inferredType = getMimeType(file);

        if (inferredType.startsWith('text/') || file.name.endsWith('.txt')) {
          try {
            textContent = await fileToText(file);
          } catch (e) { console.error(e); }
        }

        const item = {
          id: uid(),
          name: file.name,
          fileType: inferredType,
          size: file.size,
          dataUrl: dataUrl,
          textContent: textContent,
          parentId: state.currentFolderId,
          width: 112,
          height: 128
        };

        state.files.push(item);
        await saveFile(item);
      }
      render();
    }

    document.getElementById('file-input').addEventListener('change', (e) => handleFileImport(e.target.files));
    document.getElementById('photo-input').addEventListener('change', (e) => handleFileImport(e.target.files));

    // --- SMOOTH DRAG & RESIZE LISTENERS ---
    function attachDragAndResizeListeners() {
      if (!state.editMode) return;

      const elements = document.querySelectorAll('[data-id]');
      elements.forEach(el => {
        let activeDrag = false;
        let activeResize = false;
        let startX, startY, origX, origY, origW, origH;

        const resizeHandle = el.querySelector('.resize-handle');

        const onStart = (e) => {
          const touch = e.touches ? e.touches[0] : e;
          startX = touch.clientX;
          startY = touch.clientY;

          if (e.target === resizeHandle || resizeHandle.contains(e.target)) {
            activeResize = true;
            origW = el.offsetWidth;
            origH = el.offsetHeight;
          } else {
            activeDrag = true;
            origX = parseInt(el.style.left) || 0;
            origY = parseInt(el.style.top) || 0;
          }
        };

        const onMove = (e) => {
          if (!activeDrag && !activeResize) return;
          const touch = e.touches ? e.touches[0] : e;
          const dx = touch.clientX - startX;
          const dy = touch.clientY - startY;

          if (activeDrag) {
            let rawX = Math.max(8, origX + dx);
            let rawY = Math.max(8, origY + dy);
            let snappedX = Math.round(rawX / CONFIG.GRID_SIZE) * CONFIG.GRID_SIZE;
            let snappedY = Math.round(rawY / CONFIG.GRID_SIZE) * CONFIG.GRID_SIZE;
            el.style.left = `${snappedX}px`;
            el.style.top = `${snappedY}px`;
          } else if (activeResize) {
            let newW = Math.max(64, origW + dx);
            let newH = Math.max(64, origH + dy);
            el.style.width = `${newW}px`;
            el.style.height = `${newH}px`;
          }
        };

        const onEnd = () => {
          if (!activeDrag && !activeResize) return;
          const id = el.getAttribute('data-id');
          let target = state.folders.find(f => f.id === id) || state.files.find(f => f.id === id);

          if (target) {
            if (activeDrag) {
              target.x = parseInt(el.style.left);
              target.y = parseInt(el.style.top);
            }
            if (activeResize) {
              target.width = parseInt(el.style.width);
              target.height = parseInt(el.style.height);
            }
            if (isFolder(target)) saveFolder(target); else saveFile(target);
          }

          activeDrag = false;
          activeResize = false;
        };

        el.addEventListener('touchstart', onStart, { passive: true });
        el.addEventListener('mousedown', onStart);
        window.addEventListener('touchmove', onMove, { passive: true });
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchend', onEnd);
        window.addEventListener('mouseup', onEnd);
      });
    }

    loadData();
  </script>
</body>
</html>
