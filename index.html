<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gothic Archive</title>
    <style>
        :root {
            --bg-color: #0c0a09;
            --surface-color: #171412;
            --surface-glass: rgba(23, 20, 18, 0.85);
            --border-color: #3b2f2f;
            --border-glow: #5c4033;
            --text-main: #e7e2dc;
            --text-muted: #a39b93;
            --accent: #8b0000;
            --accent-glow: #ff4d4d;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --grid-line: rgba(139, 0, 0, 0.08);
            --font-main: 'Cinzel', 'Times New Roman', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
        }

        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1212 0%, #0c0a09 100%);
        }

        /* Guide Grid Overlay */
        #guide-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        body.edit-mode #guide-grid {
            opacity: 1;
        }

        /* Infinite Canvas Layer */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 5000px;
            height: 5000px;
            transform-origin: 0 0;
            cursor: grab;
            z-index: 2;
        }

        #canvas:active {
            cursor: grabbing;
        }

        body.edit-mode #canvas {
            cursor: default;
        }

        /* Archive Items (Relics & Folders) */
        .archive-item {
            position: absolute;
            background: var(--surface-glass);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: border-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .archive-item:hover {
            border-color: var(--border-glow);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        body.edit-mode .archive-item {
            cursor: move;
            border-style: dashed;
            border-color: var(--accent);
        }

        .archive-item.folder {
            min-width: 200px;
            min-height: 150px;
            background: rgba(20, 15, 14, 0.9);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--gold);
        }

        .item-title {
            outline: none;
            border: none;
            background: transparent;
            color: var(--gold);
            font-family: var(--font-main);
            width: 100%;
        }

        .item-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            min-height: 80px;
        }

        .item-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 2px;
        }

        /* Resizer Handle */
        .resizer {
            position: absolute;
            right: 2px;
            bottom: 2px;
            width: 12px;
            height: 12px;
            cursor: nwse-resize;
            display: none;
        }

        body.edit-mode .resizer {
            display: block;
        }

        .resizer::after {
            content: '';
            position: absolute;
            right: 3px;
            bottom: 3px;
            width: 6px;
            height: 6px;
            border-right: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
        }

        /* Formatting Toolbar */
        #toolbar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-glass);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .tool-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .tool-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        .tool-btn.active {
            background: var(--accent);
            border-color: var(--accent-glow);
            color: #fff;
        }

        /* Context Menu */
        #context-menu {
            position: fixed;
            background: var(--surface-color);
            border: 1px solid var(--gold);
            border-radius: 4px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            z-index: 2000;
            min-width: 160px;
        }

        .context-option {
            padding: 10px 15px;
            font-size: 0.85rem;
            color: var(--text-main);
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s, color 0.2s;
        }

        .context-option:last-child {
            border-bottom: none;
        }

        .context-option:hover {
            background: var(--accent);
            color: #fff;
        }

        /* Modal Confirmation */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-box {
            background: var(--surface-color);
            border: 1px solid var(--gold);
            padding: 25px;
            border-radius: 6px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            box-shadow: 0 0 25px var(--gold-glow);
        }

        .modal-msg {
            margin-bottom: 20px;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="guide-grid"></div>
        <div id="canvas"></div>
    </div>

    <!-- Formatting Bar -->
    <div id="toolbar">
        <button class="tool-btn" id="btn-edit" onclick="toggleEditMode()">Edit Mode</button>
        <button class="tool-btn" id="btn-recentering" onclick="recentering()">Recenter</button>
        <button class="tool-btn" onclick="addRelic()">Add Relic</button>
        <button class="tool-btn" onclick="addFolder()">Add Folder</button>
        <button class="tool-btn" onclick="saveArchive()">Save</button>
        <button class="tool-btn" onclick="loadArchiveModal()">Load</button>
    </div>

    <!-- Context Menu -->
    <div id="context-menu">
        <div class="context-option" onclick="ctxAction('resizeOriginal')">Resize to Original</div>
        <div class="context-option" onclick="ctxAction('changeImage')">Change Image</div>
        <div class="context-option" onclick="ctxAction('rename')">Rename</div>
        <div class="context-option" onclick="ctxAction('moveToFolder')">Move to Folder</div>
        <div class="context-option" onclick="ctxAction('openTab')">Open in New Tab</div>
        <div class="context-option" onclick="ctxAction('delete')" style="color: #ff4d4d;">Delete</div>
    </div>

    <!-- Confirmation Modal -->
    <div id="modal-overlay">
        <div class="modal-box">
            <div class="modal-msg" id="modal-text">Are you sure you want to delete this relic?</div>
            <div class="modal-actions">
                <button class="tool-btn" onclick="confirmAction(true)">Confirm</button>
                <button class="tool-btn" onclick="confirmAction(false)">Cancel</button>
            </div>
        </div>
    </div>

    <input type="file" id="hidden-file-input" style="display: none;" accept="image/*" onchange="handleImageUpload(event)">

    <script>
        // State management
        let editMode = false;
        let scale = 1;
        let panX = 1500;
        let panY = 1500;
        let isPanning = false;
        let startX = 0, startY = 0;
        
        let items = [
            { id: 'relic-1', type: 'relic', title: 'The Crimson Codex', x: 2400, y: 2400, w: 220, h: 200, content: 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?auto=format&fit=crop&w=400&q=80', originalW: 220, originalH: 200 }
        ];

        let activeCtxItem = null;
        let pendingDeleteId = null;
        let activeImageTarget = null;

        const canvas = document.getElementById('canvas');
        const contextMenu = document.getElementById('context-menu');

        // Initialize view
        function init() {
            renderItems();
            updateTransform();
            setupCanvasPanZoom();
        }

        function toggleEditMode() {
            editMode = !editMode;
            document.body.classList.toggle('edit-mode', editMode);
            const btn = document.getElementById('btn-edit');
            btn.classList.toggle('active', editMode);
            btn.textContent = editMode ? 'Lock Edit' : 'Edit Mode';
            if (!editMode) contextMenu.style.display = 'none';
        }

        function recentering() {
            panX = 1500;
            panY = 1500;
            scale = 1;
            updateTransform();
        }

        function updateTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        // Pan and Zoom engine
        function setupCanvasPanZoom() {
            const container = document.getElementById('app-container');

            container.addEventListener('mousedown', (e) => {
                if (e.target === container || e.target === canvas || e.target === document.getElementById('guide-grid')) {
                    if (!editMode) {
                        isPanning = true;
                        startX = e.clientX - panX;
                        startY = e.clientY - panY;
                    }
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (isPanning) {
                    panX = e.clientX - startX;
                    panY = e.clientY - startY;
                    updateTransform();
                }
            });

            window.addEventListener('mouseup', () => {
                isPanning = false;
            });

            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomFactor = 1.1;
                let newScale = e.deltaY < 0 ? scale * zoomFactor : scale / zoomFactor;
                newScale = Math.max(0.2, Math.min(3, newScale));
                
                // Zoom around center
                const rect = container.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                panX = mouseX - (mouseX - panX) * (newScale / scale);
                panY = mouseY - (mouseY - panY) * (newScale / scale);
                scale = newScale;

                updateTransform();
            }, { passive: false });
        }

        // Render Archive Elements
        function renderItems() {
            canvas.innerHTML = '';
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = `archive-item ${item.type}`;
                el.id = item.id;
                el.style.left = `${item.x}px`;
                el.style.top = `${item.y}px`;
                el.style.width = `${item.w}px`;
                el.style.height = `${item.h}px`;

                el.innerHTML = `
                    <div class="item-header">
                        <input type="text" class="item-title" value="${item.title}" ${!editMode ? 'readonly' : ''}>
                    </div>
                    <div class="item-content">
                        ${item.content.startsWith('http') || item.content.startsWith('data:') 
                            ? `<img src="${item.content}" alt="Relic">` 
                            : `<span>${item.content}</span>`}
                    </div>
                    <div class="resizer"></div>
                `;

                // Dragging and Editing logic
                if (editMode) {
                    setupDragAndResize(el, item);
                }

                // Context menu on right click
                el.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (editMode) {
                        activeCtxItem = item.id;
                        contextMenu.style.display = 'flex';
                        contextMenu.style.left = `${e.clientX}px`;
                        contextMenu.style.top = `${e.clientY}px`;
                    }
                });

                canvas.appendChild(el);
            });
        }

        function setupDragAndResize(el, item) {
            let isDragging = false;
            let isResizing = false;
            let startX, startY;
            const snapSize = 40;

            const header = el.querySelector('.item-header');
            header.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                isDragging = true;
                startX = e.clientX - item.x * scale;
                startY = e.clientY - item.y * scale;
                e.stopPropagation();
            });

            const resizer = el.querySelector('.resizer');
            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startY = e.clientY;
                e.stopPropagation();
            });

            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    let rawX = (e.clientX - startX) / scale;
                    let rawY = (e.clientY - startY) / scale;
                    // Snap to grid
                    item.x = Math.round(rawX / snapSize) * snapSize;
                    item.y = Math.round(rawY / snapSize) * snapSize;
                    el.style.left = `${item.x}px`;
                    el.style.top = `${item.y}px`;
                } else if (isResizing) {
                    let rawW = item.w + (e.clientX - startX) / scale;
                    let rawH = item.h + (e.clientY - startY) / scale;
                    item.w = Math.max(120, Math.round(rawW / snapSize) * snapSize);
                    item.h = Math.max(100, Math.round(rawH / snapSize) * snapSize);
                    el.style.width = `${item.w}px`;
                    el.style.height = `${item.h}px`;
                    startX = e.clientX;
                    startY = e.clientY;
                }
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                isResizing = false;
            });
        }

        // Context Menu Actions
        function ctxAction(action) {
            contextMenu.style.display = 'none';
            const item = items.find(i => i.id === activeCtxItem);
            if (!item) return;

            switch(action) {
                case 'resizeOriginal':
                    item.w = item.originalW || 220;
                    item.h = item.originalH || 200;
                    renderItems();
                    break;
                case 'changeImage':
                    activeImageTarget = item.id;
                    document.getElementById('hidden-file-input').click();
                    break;
                case 'rename':
                    const el = document.getElementById(item.id).querySelector('.item-title');
                    el.removeAttribute('readonly');
                    el.focus();
                    el.addEventListener('blur', () => {
                        item.title = el.value;
                        el.setAttribute('readonly', true);
                    }, { once: true });
                    break;
                case 'moveToFolder':
                    alert('Folder integration active.');
                    break;
                case 'openTab':
                    const win = window.open();
                    win.document.write(`<img src="${item.content}" style="max-width:100%;">`);
                    break;
                case 'delete':
                    pendingDeleteId = item.id;
                    document.getElementById('modal-text').textContent = `Are you sure you want to delete "${item.title}"?`;
                    document.getElementById('modal-overlay').style.display = 'flex';
                    break;
            }
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file && activeImageTarget) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const item = items.find(i => i.id === activeImageTarget);
                    if (item) {
                        item.content = event.target.result;
                        renderItems();
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        function confirmAction(confirm) {
            document.getElementById('modal-overlay').style.display = 'none';
            if (confirm && pendingDeleteId) {
                items = items.filter(i => i.id !== pendingDeleteId);
                renderItems();
            }
            pendingDeleteId = null;
        }

        // Add options
        function addRelic() {
            const newId = 'relic-' + Date.now();
            items.push({
                id: newId,
                type: 'relic',
                title: 'New Relic',
                x: Math.round(-panX / scale + window.innerWidth / (2 * scale)),
                y: Math.round(-panY / scale + window.innerHeight / (2 * scale)),
                w: 220,
                h: 200,
                content: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=400&q=80',
                originalW: 220,
                originalH: 200
            });
            renderItems();
        }

        function addFolder() {
            const newId = 'folder-' + Date.now();
            items.push({
                id: newId,
                type: 'folder',
                title: 'Crypt Folder',
                x: Math.round(-panX / scale + window.innerWidth / (2 * scale)),
                y: Math.round(-panY / scale + window.innerHeight / (2 * scale)),
                w: 240,
                h: 180,
                content: 'Empty Archive',
                originalW: 240,
                originalH: 180
            });
            renderItems();
        }

        function saveArchive() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(items));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "gothic_archive.json");
            document.body.appendChild(dlAnchor);
            dlAnchor.click();
            dlAnchor.remove();
        }

        function loadArchiveModal() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.readAsText(file, 'UTF-8');
                reader.onload = readerEvent => {
                    try {
                        items = JSON.parse(readerEvent.target.result);
                        renderItems();
                    } catch(err) {
                        alert('Invalid archive file.');
                    }
                }
            };
            input.click();
        }

        window.addEventListener('click', (e) => {
            if (!contextMenu.contains(e.target)) {
                contextMenu.style.display = 'none';
            }
        });

        window.onload = init;
    </script>
</body>
</html>
