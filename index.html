<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Gothic Archive (Formation & Snap-to-Grid)</title>
    <style>
        :root {
            --bg-color: #0b0b0e;
            --panel-bg: #141419;
            --panel-border: #262630;
            --accent: #c5a880;
            --accent-glow: rgba(197, 168, 128, 0.2);
            --text-main: #e2e2e9;
            --text-muted: #8e8e9e;
            --danger: #d9534f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: fixed;
        }

        #workspace {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, #181822 0%, #0b0b0e 100%);
        }

        /* Subtle Guide Grid (Visible only in Edit Mode) */
        #workspace.edit-mode-active::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(197, 168, 128, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(197, 168, 128, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        #canvas-content {
            position: absolute;
            width: 4000px;
            height: 4000px;
            transform-origin: 0 0;
            will-change: transform;
        }

        /* Folders and Relics */
        .archive-item {
            position: absolute;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 12px;
            cursor: grab;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .archive-item:active {
            cursor: grabbing;
        }

        .archive-item.folder {
            width: 140px;
            height: 110px;
            justify-content: center;
        }

        .archive-item.relic {
            width: 180px;
            height: 200px;
        }

        .archive-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            pointer-events: none;
        }

        .archive-item .title {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-main);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* UI Toolbar / Formatting Bar matching the exact look */
        #toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s, color 0.2s;
        }

        .tool-btn:hover {
            background: var(--panel-border);
            color: var(--accent);
        }

        .tool-btn.active {
            background: var(--accent);
            color: var(--bg-color);
            font-weight: 600;
        }

        /* Context Menu matching the exact user screenshot design */
        #context-menu {
            position: fixed;
            background: #141419;
            border: 1px solid #262630;
            border-radius: 16px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            min-width: 240px;
        }

        .menu-item {
            background: transparent;
            border: none;
            color: #e2e2e9;
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background 0.15s;
        }

        .menu-item:hover {
            background: #262630;
        }

        .menu-item.danger {
            color: #f87171;
        }

        .menu-item.danger:hover {
            background: rgba(248, 113, 113, 0.15);
        }

        .menu-divider {
            height: 1px;
            background: #262630;
            margin: 4px 8px;
        }

        /* Modal Overlays */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 24px;
            border-radius: 16px;
            width: 320px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .modal h3 {
            font-size: 16px;
            color: var(--text-main);
        }

        .modal input {
            background: var(--bg-color);
            border: 1px solid var(--panel-border);
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        .modal input:focus {
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .modal-btn {
            background: var(--panel-border);
            border: none;
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: var(--accent);
            color: var(--bg-color);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="workspace">
        <div id="canvas-content">
            <!-- Dynamic archive items rendered via JS -->
        </div>
    </div>

    <!-- Original Formatting Bar / Toolbar -->
    <div id="toolbar">
        <button class="tool-btn" id="btn-edit" onclick="toggleEditMode()">✏️ Edit Mode</button>
        <button class="tool-btn" onclick="recentering()">🎯 Recentre</button>
        <button class="tool-btn" onclick="saveState()">💾 Save</button>
        <button class="tool-btn" onclick="loadState()">📂 Load</button>
        <button class="tool-btn" onclick="addItem()">➕ Add Item</button>
    </div>

    <!-- Context Menu matching the exact uploaded image -->
    <div id="context-menu">
        <button class="menu-item" onclick="menuAction('cover')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Change cover image
        </button>
        <button class="menu-item" onclick="menuAction('rename')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Rename
        </button>
        <button class="menu-item" onclick="menuAction('folder')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            Move to folder
        </button>
        <button class="menu-item" onclick="menuAction('shape')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            Snap to original shape
        </button>
        <div class="menu-divider"></div>
        <button class="menu-item danger" onclick="menuAction('delete')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Delete
        </button>
    </div>

    <!-- Rename Modal -->
    <div class="modal-overlay" id="rename-modal">
        <div class="modal">
            <h3>Rename Item</h3>
            <input type="text" id="rename-input" placeholder="Enter new name...">
            <div class="modal-actions">
                <button class="modal-btn" onclick="closeModals()">Cancel</button>
                <button class="modal-btn primary" onclick="confirmRename()">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal">
            <h3>Confirm Deletion</h3>
            <p style="font-size: 13px; color: var(--text-muted);">Are you sure you want to delete this item? This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="modal-btn" onclick="closeModals()">Cancel</button>
                <button class="modal-btn primary" style="background: var(--danger); color: white;" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        let scale = 1;
        let panX = 2000 - window.innerWidth / 2;
        let panY = 2000 - window.innerHeight / 2;
        let isPanning = false;
        let startX = 0, startY = 0;
        let editMode = false;
        let activeElement = null;
        let longPressTimer = null;

        const workspace = document.getElementById('workspace');
        const canvas = document.getElementById('canvas-content');
        const contextMenu = document.getElementById('context-menu');

        let items = [
            { id: 1, type: 'folder', title: 'Gothic Sanctuary', x: 1950, y: 1900, img: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=300' },
            { id: 2, type: 'relic', title: 'Midnight Relic', x: 2150, y: 1900, img: 'https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=300' }
        ];

        function render() {
            canvas.innerHTML = '';
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = `archive-item ${item.type}`;
                el.style.left = `${item.x}px`;
                el.style.top = `${item.y}px`;
                el.dataset.id = item.id;

                if(item.type === 'relic') {
                    el.innerHTML = `<img src="${item.img}" alt=""><div class="title">${item.title}</div>`;
                } else {
                    el.innerHTML = `<div style="font-size: 28px;">📁</div><div class="title">${item.title}</div>`;
                }

                el.addEventListener('pointerdown', (e) => handlePointerDown(e, item));
                el.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    activeElement = item;
                    showContextMenu(e.clientX, e.clientY);
                });

                canvas.appendChild(el);
            });
            updateTransform();
        }

        function updateTransform() {
            canvas.style.transform = `translate(${-panX}px, ${-panY}px) scale(${scale})`;
        }

        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = 1.1;
            const oldScale = scale;
            if (e.deltaY < 0) {
                scale *= zoomFactor;
            } else {
                scale /= zoomFactor;
            }
            scale = Math.max(0.2, Math.min(5, scale));

            const rect = workspace.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            panX = mouseX + panX - mouseX * (scale / oldScale);
            panY = mouseY + panY - mouseY * (scale / oldScale);

            updateTransform();
        }, { passive: false });

        workspace.addEventListener('pointerdown', (e) => {
            if (e.target === workspace || e.target === canvas) {
                isPanning = true;
                startX = e.clientX + panX;
                startY = e.clientY + panY;
                closeContextMenu();
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (isPanning) {
                panX = startX - e.clientX;
                panY = startY - e.clientY;
                updateTransform();
            }
        });

        window.addEventListener('pointerup', () => {
            isPanning = false;
        });

        function recentering() {
            scale = 1;
            panX = 2000 - window.innerWidth / 2;
            panY = 2000 - window.innerHeight / 2;
            updateTransform();
        }

        function toggleEditMode() {
            editMode = !editMode;
            workspace.classList.toggle('edit-mode-active', editMode);
            document.getElementById('btn-edit').classList.toggle('active', editMode);
        }

        let draggingItem = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        function handlePointerDown(e, item) {
            closeContextMenu();
            
            // Long press support to trigger menu instantly on any item
            longPressTimer = setTimeout(() => {
                activeElement = item;
                showContextMenu(e.clientX, e.clientY);
            }, 400);

            if(!editMode) return;
            
            draggingItem = item;
            const rect = e.currentTarget.getBoundingClientRect();
            dragOffsetX = (e.clientX - rect.left) / scale;
            dragOffsetY = (e.clientY - rect.top) / scale;
        }

        window.addEventListener('pointermove', (e) => {
            if (draggingItem && editMode) {
                clearTimeout(longPressTimer);
                const rect = workspace.getBoundingClientRect();
                let newX = (e.clientX - rect.left) / scale + panX - dragOffsetX;
                let newY = (e.clientY - rect.top) / scale + panY - dragOffsetY;

                newX = Math.round(newX / 40) * 40;
                newY = Math.round(newY / 40) * 40;

                newX = Math.max(100, Math.min(3850, newX));
                newY = Math.max(100, Math.min(3850, newY));

                draggingItem.x = newX;
                draggingItem.y = newY;
                render();
            }
        });

        window.addEventListener('pointerup', () => {
            clearTimeout(longPressTimer);
            draggingItem = null;
        });

        function showContextMenu(x, y) {
            contextMenu.style.display = 'flex';
            contextMenu.style.left = `${Math.min(x, window.innerWidth - 260)}px`;
            contextMenu.style.top = `${Math.min(y, window.innerHeight - 280)}px`;
        }

        function closeContextMenu() {
            contextMenu.style.display = 'none';
        }

        window.addEventListener('click', (e) => {
            if (!contextMenu.contains(e.target)) closeContextMenu();
        });

        function menuAction(action) {
            closeContextMenu();
            if(!activeElement) return;

            if(action === 'cover') {
                const url = prompt("Enter new cover image URL:", activeElement.img || "");
                if(url) {
                    activeElement.img = url;
                    render();
                }
            } else if(action === 'rename') {
                document.getElementById('rename-input').value = activeElement.title;
                document.getElementById('rename-modal').style.display = 'flex';
            } else if(action === 'folder') {
                const folderName = prompt("Enter target folder name:");
                if(folderName) {
                    activeElement.title = `${activeElement.title} (${folderName})`;
                    render();
                }
            } else if(action === 'shape') {
                activeElement.x = Math.round(activeElement.x / 40) * 40;
                activeElement.y = Math.round(activeElement.y / 40) * 40;
                render();
            } else if(action === 'delete') {
                document.getElementById('delete-modal').style.display = 'flex';
            }
        }

        function confirmRename() {
            const val = document.getElementById('rename-input').value;
            if(val && activeElement) {
                activeElement.title = val;
                render();
            }
            closeModals();
        }

        function confirmDelete() {
            if(activeElement) {
                items = items.filter(i => i.id !== activeElement.id);
                render();
            }
            closeModals();
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        }

        function addItem() {
            const newId = Date.now();
            items.push({
                id: newId,
                type: Math.random() > 0.5 ? 'relic' : 'folder',
                title: 'New Specimen',
                x: panX + window.innerWidth / 2,
                y: panY + window.innerHeight / 2,
                img: 'https://images.unsplash.com/photo-1544816155-12df9643f363?w=300'
            });
            render();
        }

        function saveState() {
            localStorage.setItem('gothic_archive_state', JSON.stringify(items));
            alert('Archive saved successfully.');
        }

        function loadState() {
            const saved = localStorage.getItem('gothic_archive_state');
            if(saved) {
                items = JSON.parse(saved);
                render();
                alert('Archive loaded successfully.');
            } else {
                alert('No saved state found.');
            }
        }

        render();
        recentering();
    </script>
</body>
</html>
